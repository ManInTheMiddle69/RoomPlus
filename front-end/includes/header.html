<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futuristic Header</title>
</head>
<body>

<style>
    /* ----- RESET & BASE ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f2f2f2;
      font-family: 'Poppins', 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      transition: background-color 0.3s ease;
    }

    [data-theme="dark"] body {
      background-color: #0e0e0e;
    }

    /* ----- HEADER CONTAINER ----- */
    .header-futuristic-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      background: transparent;   
      transition: all 0.25s ease;
      width: 100%;
    }

    .header-site-name {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(125deg, #2a2a2a, #5a5a5a, #3a3a3a);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-transform: uppercase;
      position: relative;
    }

    [data-theme="dark"] .header-site-name {
      background: linear-gradient(125deg, #ffffff, #888, #eee);
      -webkit-background-clip: text;
    }

    .header-site-name::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 35%;
      height: 2.5px;
      background: linear-gradient(90deg, #4a4a4a, #aaaaaa, transparent);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .header-nav-buttons {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .header-nav-btn {
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 550;
      padding: 0.5rem 1rem;
      color: #3a3a3a;
      position: relative;
      transition: color 0.3s;
      font-family: inherit;
    }

    [data-theme="dark"] .header-nav-btn {
      color: #aaaaaa;
    }

    /* Underline Animation */
    .header-nav-btn::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 15%;
      width: 0%;
      height: 2px;
      background: linear-gradient(90deg, #4a4a4a, #aaaaaa, #4a4a4a);
      transition: width 0.3s;
    }

    .header-nav-btn:hover::after {
      width: 70%;
    }

    .header-theme-toggle {
      background: transparent;
      border: 1.5px solid #3a3a3a;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #3a3a3a;
      transition: all 0.3s ease;
    }

    [data-theme="dark"] .header-theme-toggle {
      border-color: #ffffff;
      color: #ffffff;
    }

    /* ---------- SMARTPHONE OPTIMIZATION ---------- */
    @media (max-width: 768px) {
      .header-futuristic-header {
        flex-direction: column; /* Stack logo above nav */
        padding: 1.5rem 1rem;
        gap: 1.2rem;
        text-align: center;
      }

      .header-site-name {
        font-size: 1.6rem;
      }

      .header-site-name::after {
        left: 50%;
        transform: translateX(-50%); /* Center the logo underline on mobile */
      }

      .header-nav-buttons {
        gap: 0.8rem;
        justify-content: center;
        width: 100%;
      }

      .header-nav-btn {
        font-size: 0.9rem;
        padding: 0.4rem 0.6rem;
      }

      .header-theme-toggle {
        width: 36px;
        height: 36px;
        font-size: 1rem;
      }
    }

    /* Extra small screens */
    @media (max-width: 400px) {
      .header-nav-buttons {
        gap: 0.4rem;
      }
      .header-nav-btn {
        font-size: 0.8rem;
      }
    }
</style>

<header class="header-futuristic-header">
  <div class="header-site-name">ROOM<span style="font-weight:300">PLUS+</span></div>
  <div class="header-nav-buttons">
    <a class="header-nav-btn" href="/WebSite1/front-end/home.php">HOME</a>
    <a class="header-nav-btn" href="/WebSite1/front-end/product-list.php">SHOP</a>
    <a class="header-nav-btn" href="">CONTACT</a>
    
    <button id="header-theme-toggle" class="header-theme-toggle">
      <span id="header-toggle-icon">☼</span>
    </button>
  </div>
</header>

<script>
  const headerToggleBtn = document.getElementById('header-theme-toggle');
  const headerToggleIcon = document.getElementById('header-toggle-icon');
  const headerRoot = document.documentElement;

  const headerSavedTheme = localStorage.getItem('theme') || 'light';
  headerRoot.setAttribute('data-theme', headerSavedTheme);
  headerToggleIcon.textContent = headerSavedTheme === 'dark' ? '☾' : '☼';

  headerToggleBtn.addEventListener('click', () => {
    const isDark = headerRoot.getAttribute('data-theme') === 'dark';
    const newTheme = isDark ? 'light' : 'dark';
    
    headerRoot.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    headerToggleIcon.textContent = newTheme === 'dark' ? '☾' : '☼';
  });
</script>

</body>
</html>
