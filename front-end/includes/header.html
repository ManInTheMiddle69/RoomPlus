<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/WebSite1/front-end/css/style.css">
  <title>Futuristic Header</title>
</head>
<body>



<header class="header-futuristic-header">
  <div class="header-site-name">ROOM<span style="font-weight:300">PLUS+</span></div>
  <div class="header-nav-buttons">
    <a class="header-nav-btn" href="/WebSite1/front-end/home.php">HOME</a>
    <a class="header-nav-btn" href="/WebSite1/front-end/product-list.php">SHOP</a>
    <a class="header-nav-btn" href="">CONTACT</a>
    
    <button id="header-theme-toggle" class="header-theme-toggle">
      <span id="header-toggle-icon">☼</span>
    </button>
  </div>
</header>

<script>
  const headerToggleBtn = document.getElementById('header-theme-toggle');
  const headerToggleIcon = document.getElementById('header-toggle-icon');
  const headerRoot = document.documentElement;

  const headerSavedTheme = localStorage.getItem('theme') || 'light';
  headerRoot.setAttribute('data-theme', headerSavedTheme);
  headerToggleIcon.textContent = headerSavedTheme === 'dark' ? '☾' : '☼';

  headerToggleBtn.addEventListener('click', () => {
    const isDark = headerRoot.getAttribute('data-theme') === 'dark';
    const newTheme = isDark ? 'light' : 'dark';
    
    headerRoot.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    headerToggleIcon.textContent = newTheme === 'dark' ? '☾' : '☼';
  });
</script>

</body>
</html>
